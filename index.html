<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 Roleta Premiun | Sorteio Moderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Partículas de fundo */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Premium */
        .premium-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .premium-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.3);
            letter-spacing: -1px;
        }

        .premium-header .badge-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .premium-badge {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: #FFD700;
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* Card Principal */
        .roleta-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        /* Display do Prêmio */
        .premium-display {
            text-align: center;
            margin-bottom: 40px;
        }

        .premium-display-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }

        .premio-atual {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 30px;
            padding: 50px;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 50px rgba(255,215,0,0.1);
            transition: all 0.3s ease;
        }

        .premio-atual h2 {
            font-size: 3rem;
            font-weight: 800;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .premio-atual .premio-nome {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Slot Machine Moderna */
        .slot-machine-modern {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }

        .slot-reel {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        .slot-reel.spinning {
            animation: slotSpin 0.1s linear infinite;
        }

        @keyframes slotSpin {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        /* Input Moderno */
        .input-modern {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 5px 20px;
            transition: all 0.3s ease;
        }

        .input-modern input {
            background: transparent;
            border: none;
            padding: 15px 10px;
            color: white;
            font-size: 16px;
            width: 100%;
        }

        .input-modern input:focus {
            outline: none;
        }

        .input-modern input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .input-modern:focus-within {
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        /* Botão Girar Premium */
        .btn-spin-premium {
            background: linear-gradient(135deg, #FFD700, #FF6B6B);
            border: none;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-spin-premium::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-spin-premium:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-spin-premium:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Modal Resultado */
        .modal-result {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .modal-content-premium {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 2px solid #FFD700;
            box-shadow: 0 0 100px rgba(255,215,0,0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .confetti-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .premio-ganho {
            font-size: 2rem;
            font-weight: 800;
            color: #FFD700;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        /* Histórico */
        .historico-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
        }

        .historico-header {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lista-ganhadores {
            max-height: 300px;
            overflow-y: auto;
        }

        .ganhador-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .ganhador-item:hover {
            transform: translateX(10px);
            background: rgba(255,215,0,0.1);
        }

        .ganhador-nome {
            font-weight: 700;
            color: white;
        }

        .ganhador-premio {
            color: #FFD700;
            font-weight: 700;
        }

        .ganhador-data {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        /* Scrollbar */
        .lista-ganhadores::-webkit-scrollbar {
            width: 8px;
        }

        .lista-ganhadores::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .lista-ganhadores::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .roleta-card { padding: 30px; }
            .premio-atual h2 { font-size: 2rem; }
            .premio-atual .premio-nome { font-size: 1.3rem; }
            .slot-reel { width: 80px; height: 80px; font-size: 40px; }
            .btn-spin-premium { padding: 12px 30px; font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="premium-header">
        <h1>
            <i class="fas fa-crown"></i> ROLETA PREMIUM 
            <i class="fas fa-gem"></i>
        </h1>
        <div class="badge-container">
            <span class="premium-badge"><i class="fas fa-trophy"></i> Prêmios Exclusivos</span>
            <span class="premium-badge"><i class="fas fa-chart-line"></i> Sorteio ao Vivo</span>
            <span class="premium-badge"><i class="fas fa-shield-alt"></i> Resultado na Planilha</span>
        </div>
    </div>

    <div class="roleta-card">
        <div class="premium-display">
            <div class="premium-display-label">
                <i class="fas fa-gift"></i> PRÊMIO SORTEADO
            </div>
            <div class="premio-atual" id="premioDisplay">
                <h2><i class="fas fa-question-circle"></i></h2>
                <div class="premio-nome" id="premioNome">???</div>
            </div>
        </div>

        <div class="slot-machine-modern" id="slotMachine">
            <div class="slot-reel" id="slot1">🎁</div>
            <div class="slot-reel" id="slot2">🎰</div>
            <div class="slot-reel" id="slot3">✨</div>
        </div>

        <div class="row align-items-end g-3">
            <div class="col-md-8">
                <div class="input-modern">
                    <i class="fas fa-user" style="color: #FFD700; margin-right: 10px;"></i>
                    <input type="text" id="nickname" placeholder="Digite seu nome/nick..." maxlength="50">
                </div>
            </div>
            <div class="col-md-4">
                <button class="btn-spin-premium w-100" id="spinBtn">
                    <i class="fas fa-play"></i> GIRAR ROLETA
                </button>
            </div>
        </div>
    </div>

    <div class="historico-card">
        <div class="historico-header">
            <i class="fas fa-history"></i>
            ÚLTIMOS GANHADORES
        </div>
        <div class="lista-ganhadores" id="listaGanhadores">
            <div class="text-center text-white-50 py-4">
                <i class="fas fa-spinner fa-spin"></i> Carregando...
            </div>
        </div>
    </div>
</div>

<div class="modal-result" id="resultModal">
    <div class="modal-content-premium">
        <div class="confetti-icon">
            <i class="fas fa-trophy"></i>
        </div>
        <h3 style="color: white;">Parabéns, <span id="winnerName"></span>!</h3>
        <p style="color: rgba(255,255,255,0.8); margin-top: 15px;">Você ganhou:</p>
        <div class="premio-ganho" id="winnerPrize"></div>
        <button class="btn-spin-premium" onclick="fecharModal()" style="margin-top: 20px;">
            <i class="fas fa-check"></i> CONTINUAR
        </button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO - COLE SUA URL DO GOOGLE APPS SCRIPT AQUI
    const API_URL = 'https://script.google.com/macros/s/AKfycbxQyhIzhqqekfUqr2Y2kXULm8-kVsNP1pWJkt4XYEFbPSEuS2w1zrlMbxhVkkJEtrWiqg/exec'; // Substitua pelo ID do seu script


    // LISTA DE PRÊMIOS (personalize!)
// LISTA DE PRÊMIOS - VERSÃO SIMPLES
const PREMIOS = [
    // DESCONTOS
    { nome: "20% OFF em qualquer Pack", peso: 25, icone: "🎯" },
    { nome: "30% OFF em qualquer Pack", peso: 15, icone: "💰" },
    { nome: "50% OFF em qualquer Pack", peso: 5, icone: "💎" },
    
    // FOTOS GRÁTIS
    { nome: "2 Fotos Grátis", peso: 20, icone: "📸" },
    { nome: "3 Fotos Grátis", peso: 15, icone: "🎬" },
    { nome: "5 Fotos Grátis", peso: 8, icone: "✨" },
    
    // VÍDEO GRÁTIS
    { nome: "Vídeo Grátis", peso: 12, icone: "🎥" }
];

    let isSpinning = false;

    // SORTEAR PRÊMIO BASEADO NOS PESOS
    function sortearPremio() {
        const pesoTotal = PREMIOS.reduce((sum, p) => sum + p.peso, 0);
        let random = Math.random() * pesoTotal;
        let acumulado = 0;
        for (const premio of PREMIOS) {
            acumulado += premio.peso;
            if (random <= acumulado) return premio;
        }
        return PREMIOS[0];
    }

    // ANIMAÇÃO DA ROLETA
    async function animarRoleta(premioFinal) {
        const slots = document.querySelectorAll('.slot-reel');
        const premioDisplay = document.getElementById('premioDisplay');
        const duracao = 2000;
        const intervalo = 50;
        const numTrocas = duracao / intervalo;
        const icones = ['🎁', '🎰', '✨', '⭐', '💎', '🏆', '🎫', '🍫', '🚀', '🎉'];

        slots.forEach(slot => slot.classList.add('spinning'));

        for (let i = 0; i < numTrocas; i++) {
            await new Promise(resolve => setTimeout(resolve, intervalo));
            
            slots.forEach(slot => {
                const iconeAleatorio = icones[Math.floor(Math.random() * icones.length)];
                slot.textContent = iconeAleatorio;
            });

            const premioAleatorio = PREMIOS[Math.floor(Math.random() * PREMIOS.length)];
            premioDisplay.innerHTML = `
                <h2>${premioAleatorio.icone}</h2>
                <div class="premio-nome">${premioAleatorio.nome}</div>
            `;
        }

        slots.forEach(slot => slot.classList.remove('spinning'));
        
        premioDisplay.innerHTML = `
            <h2>${premioFinal.icone}</h2>
            <div class="premio-nome">${premioFinal.nome}</div>
        `;
    }

    // REGISTRAR NO GOOGLE SHEETS
    async function registrarGanho(nick, premio) {
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nick: nick, premio: premio.nome })
            });
            console.log('✅ Registrado na planilha!');
            return true;
        } catch (error) {
            console.error('❌ Erro ao registrar:', error);
            alert('⚠️ Erro ao conectar com a planilha, mas seu prêmio foi registrado localmente!');
            return false;
        }
    }

    // MOSTRAR MODAL COM CONFETES
    function mostrarResultado(nick, premio) {
        document.getElementById('winnerName').textContent = nick;
        document.getElementById('winnerPrize').textContent = premio.nome;
        document.getElementById('resultModal').style.display = 'flex';
        
        // Confeites
        for (let i = 0; i < 150; i++) {
            const confete = document.createElement('div');
            confete.style.position = 'fixed';
            confete.style.left = Math.random() * window.innerWidth + 'px';
            confete.style.top = '-10px';
            confete.style.width = Math.random() * 12 + 4 + 'px';
            confete.style.height = Math.random() * 12 + 4 + 'px';
            confete.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confete.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            confete.style.pointerEvents = 'none';
            confete.style.zIndex = '9999';
            confete.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
            document.body.appendChild(confete);
            setTimeout(() => confete.remove(), 3000);
        }
    }

    function fecharModal() {
        document.getElementById('resultModal').style.display = 'none';
        document.getElementById('nickname').value = '';
        document.getElementById('nickname').focus();
    }

    // CARREGAR HISTÓRICO
    async function carregarHistorico() {
        try {
            const response = await fetch(`${API_URL}?action=get`);
            const data = await response.json();
            const container = document.getElementById('listaGanhadores');
            
            if (data && data.length > 0) {
                container.innerHTML = '';
                data.slice(-10).reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'ganhador-item';
                    div.innerHTML = `
                        <div>
                            <div class="ganhador-nome"><i class="fas fa-user"></i> ${escapeHtml(item.nick)}</div>
                            <div class="ganhador-data"><i class="far fa-calendar-alt"></i> ${new Date(item.data).toLocaleString()}</div>
                        </div>
                        <div class="ganhador-premio">${escapeHtml(item.premio)}</div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<div class="text-center text-white-50 py-4"><i class="fas fa-gift"></i> Nenhum ganhador ainda! Seja o primeiro!</div>';
            }
        } catch (error) {
            console.error('Erro ao carregar histórico:', error);
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // FUNÇÃO PRINCIPAL GIRAR
    async function girarRoleta() {
        if (isSpinning) return;
        
        const nick = document.getElementById('nickname').value.trim();
        if (!nick) {
            alert('⚠️ Digite seu nome/nick para participar!');
            document.getElementById('nickname').focus();
            return;
        }

        isSpinning = true;
        const spinBtn = document.getElementById('spinBtn');
        spinBtn.disabled = true;
        spinBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GIRANDO...';

        try {
            const premioSorteado = sortearPremio();
            await animarRoleta(premioSorteado);
            await registrarGanho(nick, premioSorteado);
            mostrarResultado(nick, premioSorteado);
            await carregarHistorico();
        } catch (error) {
            console.error('Erro:', error);
            alert('❌ Ocorreu um erro. Tente novamente!');
        } finally {
            isSpinning = false;
            spinBtn.disabled = false;
            spinBtn.innerHTML = '<i class="fas fa-play"></i> GIRAR ROLETA';
        }
    }

    // CRIAR PARTÍCULAS DE FUNDO
    function criarParticulas() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = Math.random() * 20 + 10 + 's';
            container.appendChild(particle);
        }
    }

    // EVENTOS
    document.addEventListener('DOMContentLoaded', () => {
        criarParticulas();
        carregarHistorico();
        document.getElementById('spinBtn').addEventListener('click', girarRoleta);
        document.getElementById('nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') girarRoleta();
        });
    });

    // CSS para animação de queda
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fall {
            to {
                transform: translateY(${window.innerHeight + 50}px) rotate(360deg);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
